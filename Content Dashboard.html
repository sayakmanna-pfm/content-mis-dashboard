<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Production MIS Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a1512;
    --surface: #101f1a;
    --surface2: #152a22;
    --border: #1e3d30;
    --text: #e6f5ee;
    --muted: #7aaa90;
    --blue: #34d399;
    --green: #10b981;
    --amber: #f59e0b;
    --red: #ef4444;
    --purple: #a78bfa;
    --teal: #2dd4bf;
    --pink: #f472b6;
  }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* UPLOAD SCREEN */
  #upload-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; gap: 24px; padding: 32px;
  }
  .logo { font-size: 2.2rem; font-weight: 700; color: var(--blue); letter-spacing: -1px; }
  .logo span { color: var(--text); }
  .upload-sub { color: var(--muted); font-size: 1rem; }
  .drop-zone {
    width: 420px; max-width: 100%; border: 2px dashed var(--border); border-radius: 16px;
    padding: 48px 32px; text-align: center; cursor: pointer; transition: all 0.2s;
    background: var(--surface);
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--blue); background: var(--surface2); }
  .drop-zone svg { margin-bottom: 16px; opacity: 0.5; }
  .drop-zone p { color: var(--muted); margin-bottom: 16px; }
  .drop-zone strong { color: var(--text); display: block; margin-bottom: 8px; font-size: 1.1rem; }
  .btn-upload {
    background: var(--blue); color: #fff; border: none; padding: 10px 24px;
    border-radius: 8px; font-size: 0.95rem; cursor: pointer; font-weight: 600;
    transition: background 0.2s;
  }
  .btn-upload:hover { background: #2563eb; }
  #file-input { display: none; }
  .progress-wrap { width: 420px; max-width: 100%; }
  .progress-bar-outer { background: var(--surface); border-radius: 99px; height: 6px; overflow: hidden; }
  .progress-bar-inner { height: 100%; background: var(--blue); border-radius: 99px; width: 0; transition: width 0.3s; }
  .progress-label { color: var(--muted); font-size: 0.85rem; margin-top: 8px; text-align: center; }

  /* DASHBOARD */
  #dashboard { display: none; }
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 16px 28px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-title { font-size: 1.2rem; font-weight: 700; color: var(--text); }
  .header-sub { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .badge { background: var(--blue); color: #fff; font-size: 0.75rem; padding: 4px 10px; border-radius: 99px; font-weight: 600; }
  .gs-live-badge {
    font-size: 0.72rem; font-weight: 700; color: #10b981;
    background: #10b98118; border: 1px solid #10b98140;
    padding: 4px 10px; border-radius: 99px; letter-spacing: 0.3px;
  }
  .btn-reset {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 6px 14px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
  }
  .btn-reset:hover { border-color: var(--blue); color: var(--blue); }
  .main { padding: 24px 28px; max-width: 1600px; margin: 0 auto; }

  /* FILTERS */
  .filters { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; align-items: center; }
  .filter-label { color: var(--muted); font-size: 0.8rem; font-weight: 600; letter-spacing: 0.5px; }
  select {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 6px 12px; border-radius: 8px; font-size: 0.85rem; cursor: pointer;
    outline: none; transition: border-color 0.2s;
  }
  select:focus { border-color: var(--blue); }

  /* KPI CARDS */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .kpi-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; position: relative; overflow: hidden;
  }
  .kpi-card::before {
    content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
    background: var(--accent, var(--blue));
  }
  .kpi-label { font-size: 0.75rem; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
  .kpi-value { font-size: 1.9rem; font-weight: 700; color: var(--text); line-height: 1; }
  .kpi-sub { font-size: 0.78rem; color: var(--muted); margin-top: 6px; }
  .kpi-trend { font-size: 0.8rem; margin-top: 4px; font-weight: 600; }
  .kpi-trend.up { color: var(--green); }
  .kpi-trend.down { color: var(--red); }

  /* CHART GRID */
  .chart-grid { display: grid; gap: 20px; }
  .chart-grid-2 { grid-template-columns: 1fr 1fr; }
  .chart-grid-3 { grid-template-columns: 2fr 1fr; }
  .chart-grid-1 { grid-template-columns: 1fr; }

  .chart-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; display: flex; flex-direction: column;
  }
  .chart-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
  .chart-title { font-size: 0.95rem; font-weight: 700; color: var(--text); }
  .chart-subtitle { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }
  .chart-insight {
    font-size: 0.75rem; background: var(--surface2); border-radius: 6px;
    padding: 6px 10px; color: var(--muted); max-width: 240px; text-align: right; line-height: 1.4;
  }
  .chart-insight strong { color: var(--text); }
  .chart-body { flex: 1; position: relative; min-height: 220px; }

  /* HIGHLIGHTS */
  .highlights { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-top: 20px; margin-bottom: 24px; }
  .highlight-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 20px; display: flex; align-items: flex-start; gap: 14px;
  }
  .highlight-icon {
    width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; flex-shrink: 0;
  }
  .highlight-title { font-size: 0.8rem; font-weight: 700; color: var(--muted); letter-spacing: 0.4px; margin-bottom: 4px; }
  .highlight-value { font-size: 1rem; font-weight: 700; color: var(--text); }
  .highlight-desc { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

  .section-label {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 12px; margin-top: 8px;
  }
  .mb-20 { margin-bottom: 20px; }

  /* INSIGHT TABLES */
  .insight-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  .insight-table th {
    text-align: left; padding: 8px 14px; color: var(--muted);
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  .insight-table th.right, .insight-table td.right { text-align: right; }
  .insight-table td { padding: 9px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .insight-table tr:last-child td { border-bottom: none; }
  .insight-table tr:hover td { background: var(--surface2); }
  .type-pill {
    display: inline-block; padding: 2px 9px; border-radius: 99px;
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.3px;
  }
  .bar-cell { display: flex; align-items: center; gap: 8px; }
  .mini-bar-outer { flex: 1; height: 6px; background: var(--border); border-radius: 99px; min-width: 60px; }
  .mini-bar-inner { height: 100%; border-radius: 99px; }
  .trend-chip { font-size: 0.75rem; font-weight: 700; padding: 2px 7px; border-radius: 6px; }
  .trend-up   { color: #10b981; background: #10b98118; }
  .trend-down { color: #ef4444; background: #ef444418; }
  .trend-flat { color: #94a3b8; background: #94a3b818; }

  /* SPEND SHARE PANEL */
  .kpi-spend-share {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 20px;
  }
  .spend-share-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .spend-share-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
  .spend-share-row:last-child { margin-bottom: 0; }
  .spend-share-label { width: 170px; font-size: 0.8rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
  .spend-share-bar-outer { flex: 1; height: 7px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .spend-share-bar-inner { height: 100%; border-radius: 99px; transition: width 0.4s ease; }
  .spend-share-pct { width: 44px; text-align: right; font-size: 0.8rem; font-weight: 700; color: var(--text); flex-shrink: 0; }
  .spend-share-val { width: 72px; text-align: right; font-size: 0.75rem; color: var(--muted); flex-shrink: 0; }

  /* SEARCH INPUT */
  .table-search {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 6px 12px; border-radius: 8px; font-size: 0.85rem; outline: none;
    transition: border-color 0.2s; min-width: 200px;
  }
  .table-search:focus { border-color: var(--blue); }
  .table-search::placeholder { color: var(--muted); }

  /* CPH KPI ROW */
  .cph-kpi-row { display: flex; gap: 14px; flex-wrap: wrap; }
  .cph-kpi {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 18px; flex: 1; min-width: 160px; position: relative; overflow: hidden;
  }
  .cph-kpi::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; background: var(--kc, var(--blue)); }
  .cph-kpi-label { font-size: 0.7rem; font-weight: 700; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; }
  .cph-kpi-val { font-size: 1.5rem; font-weight: 700; }
  .cph-kpi-sub { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }

  /* STATUS BADGE */
  .status-ok   { color: #10b981; font-size: 0.72rem; font-weight: 700; }
  .status-warn { color: #f59e0b; font-size: 0.72rem; font-weight: 700; }
  .status-flag { color: #ef4444; font-size: 0.72rem; font-weight: 700; }

  /* MINI SECTION LABELS */
  .mini-section-label {
    font-size: 0.78rem; font-weight: 700; color: var(--blue);
    letter-spacing: 0.6px; margin-bottom: 12px; margin-top: 4px;
    padding-left: 10px; border-left: 3px solid var(--blue);
  }
  .mini-dim { font-weight: 400; color: var(--muted); letter-spacing: 0; }

  /* GENRE TABS */
  .genre-tabs-wrap { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .genre-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
  .genre-tab {
    background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    padding: 7px 20px; border-radius: 8px; font-size: 0.85rem; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .genre-tab:hover { border-color: var(--blue); color: var(--text); }
  .genre-tab.active { background: var(--blue); border-color: var(--blue); color: #fff; }

  /* RED FLAGS PANEL */
  .red-flags-wrap { display: flex; flex-direction: column; gap: 8px; }
  .rf-header { font-size: 0.72rem; font-weight: 700; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 4px; }
  .rf-cards { display: flex; gap: 10px; flex-wrap: wrap; }
  .rf-card {
    display: flex; align-items: flex-start; gap: 10px; padding: 12px 16px;
    border-radius: 10px; border: 1px solid; min-width: 220px; flex: 1;
  }
  .rf-card.critical { background: #ef444410; border-color: #ef444440; }
  .rf-card.warning  { background: #f59e0b10; border-color: #f59e0b40; }
  .rf-card.watch    { background: #3b82f610; border-color: #3b82f640; }
  .rf-icon { font-size: 1.3rem; margin-top: 1px; }
  .rf-title { font-size: 0.78rem; font-weight: 700; margin-bottom: 3px; }
  .rf-card.critical .rf-title { color: #ef4444; }
  .rf-card.warning  .rf-title { color: #f59e0b; }
  .rf-card.watch    .rf-title { color: #60a5fa; }
  .rf-body { font-size: 0.75rem; color: var(--muted); line-height: 1.5; }
  .rf-body strong { color: var(--text); }
  .rf-none { font-size: 0.8rem; color: var(--green); padding: 10px 14px; background: #10b98110; border: 1px solid #10b98140; border-radius: 8px; display: inline-block; }

  /* DIMENSION TABLE extra columns */
  .consec-badge {
    display: inline-block; padding: 2px 8px; border-radius: 6px;
    font-size: 0.72rem; font-weight: 700;
  }
  .consec-0 { background: #10b98118; color: #10b981; }
  .consec-1 { background: #10b98118; color: #10b981; }
  .consec-2 { background: #f59e0b18; color: #f59e0b; }
  .consec-3 { background: #ef444418; color: #ef4444; }

  /* ANALYTICS PANELS */
  .analytics-section { margin-bottom: 20px; }
  .analytics-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .analytics-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .analytics-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px; display: flex; flex-direction: column;
  }
  .analytics-card-title { font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .atab-row { display: flex; gap: 6px; margin-bottom: 10px; }
  .atab {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 3px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .atab:hover { border-color: var(--blue); color: var(--text); }
  .atab.active { background: var(--blue); border-color: var(--blue); color: #fff; }
  .a-table { width: 100%; border-collapse: collapse; font-size: 0.76rem; }
  .a-table th { color: var(--muted); font-size: 0.66rem; font-weight: 700; text-transform: uppercase; padding: 4px 0; border-bottom: 1px solid var(--border); }
  .a-table td { padding: 5px 0; border-bottom: 1px solid #ffffff08; color: var(--text); vertical-align: middle; }
  .a-table tr:last-child td { border-bottom: none; }
  .a-table .right { text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }
  .a-table .total-row td { color: var(--muted); font-size: 0.7rem; padding-top: 6px; border-top: 1px solid var(--border); border-bottom: none; }
  .a-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; vertical-align: middle; flex-shrink: 0; }

  @media (max-width: 1200px) { .analytics-grid-4 { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 900px) {
    .chart-grid-2, .chart-grid-3 { grid-template-columns: 1fr; }
    .analytics-grid-4 { grid-template-columns: 1fr; }
    .main { padding: 16px; }
    header { padding: 12px 16px; }
  }

  /* MAIN TABS */
  .main-tabs-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .main-tab {
    background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    padding: 8px 22px; border-radius: 8px; font-size: 0.88rem; font-weight: 700;
    cursor: pointer; transition: all 0.15s; letter-spacing: 0.2px;
  }
  .main-tab:hover { border-color: var(--blue); color: var(--text); }
  .main-tab.active { background: var(--blue); border-color: var(--blue); color: #fff; }

  /* MoM SECTIONS */
  .mom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .mom-section {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; display: flex; flex-direction: column;
  }
  .mom-section-hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .mom-section-title { font-size: 0.9rem; font-weight: 700; color: var(--text); }
  .mom-section-sub { font-size: 0.72rem; color: var(--muted); max-width: 240px; text-align: right; line-height: 1.5; }
  .mom-chart-body { position: relative; min-height: 240px; flex: 1; }
  .mom-hrs-table { overflow-x: auto; margin-top: 14px; font-size: 0.72rem; }
  .mom-hrs-table table { width: 100%; border-collapse: collapse; }
  .mom-hrs-table th { padding: 7px 12px; text-align: right; background: var(--surface2); color: var(--muted); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 2px solid var(--border); position: sticky; top: 0; }
  .mom-hrs-table th:first-child { text-align: left; }
  .mom-hrs-table td { padding: 6px 12px; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.04); color: var(--text); }
  .mom-hrs-table td:first-child { text-align: left; color: var(--muted); font-weight: 600; }
  .mom-hrs-table tr:first-child td { background: rgba(255,255,255,0.04); }
  .mom-hrs-table tr:hover td { background: rgba(255,255,255,0.06); }
  .mom-hrs-table tbody tr:nth-child(odd) td { background: rgba(255,255,255,0.02); }
  .mom-hrs-table tbody tr:nth-child(odd):hover td, .mom-hrs-table tbody tr:nth-child(even):hover td { background: rgba(255,255,255,0.07); }
  @media (max-width: 1100px) { .mom-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="upload-screen">
  <div class="logo">Content<span>MIS</span></div>
  <p class="upload-sub">Interactive Production Dashboard</p>
  <div class="drop-zone" style="cursor:default">
    <!-- Google Sheets icon -->
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-bottom:16px;opacity:0.85">
      <rect width="48" height="48" rx="8" fill="#0F9D58"/>
      <rect x="12" y="10" width="24" height="28" rx="2" fill="white"/>
      <rect x="16" y="16" width="16" height="2" rx="1" fill="#0F9D58"/>
      <rect x="16" y="21" width="16" height="2" rx="1" fill="#0F9D58"/>
      <rect x="16" y="26" width="10" height="2" rx="1" fill="#0F9D58"/>
    </svg>
    <strong id="gs-status">Connecting to Google Sheets…</strong>
    <p id="gs-sub" style="margin-top:6px;margin-bottom:0">Fetching latest data</p>
  </div>
  <div class="progress-wrap" id="progress-wrap" style="display:block;margin-top:16px">
    <div class="progress-bar-outer"><div class="progress-bar-inner" id="progress-bar" style="width:10%"></div></div>
    <p class="progress-label" id="progress-label">Connecting…</p>
  </div>
  <p id="gs-error" style="display:none;color:#ef4444;font-size:0.85rem;margin-top:12px;text-align:center"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <header>
    <div>
      <div class="header-title">Content Production MIS</div>
      <div class="header-sub" id="header-sub">Loading...</div>
    </div>
    <div class="header-right">
      <span class="badge" id="header-badge">— shows</span>
      <span class="gs-live-badge">● Live · Google Sheets</span>
      <button class="btn-reset" onclick="refreshFromSheets()">&#8635; Refresh Data</button>
    </div>
  </header>

  <div class="main">

    <!-- FILTERS -->
    <div class="filters">
      <span class="filter-label">FILTER BY</span>
      <select id="filter-month-start" onchange="applyFilters()"><option value="">From: All</option></select>
      <select id="filter-month-end" onchange="applyFilters()"><option value="">To: All</option></select>
      <select id="filter-category" onchange="applyFilters()"><option value="">All Categories</option></select>
      <select id="filter-type" onchange="applyFilters()"><option value="">All Show Types</option></select>
    </div>

    <!-- MAIN TABS -->
    <div class="main-tabs-row mb-16" id="main-tabs-row"></div>
    <!-- MoM CONTENT -->
    <div id="mom-content"></div>

    <!-- SOLO LEVELING SECTION (tracked separately, never in overall) -->
    <div id="sl-section" style="margin-top:32px"></div>

  </div>
</div>

<script>
// ─── GLOBALS ────────────────────────────────────────────────────────────────
let rawData = [];       // all parsed data rows
let allMonths = [];     // sorted unique months
let charts = {};        // Chart.js instances

const MONTHS_MAP = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const fmt = m => MONTHS_MAP[parseInt(m.slice(4,6))-1] + ' ' + m.slice(0,4);
const toNum = v => { if (!v) return 0; const n = parseFloat(String(v).replace(/[",\s]/g,'')); return isNaN(n) ? 0 : n; };
const kFmt = n => n >= 1e6 ? (n/1e6).toFixed(2)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'K' : n.toFixed(0);
const cFmt = n => '$' + kFmt(n);

const COLORS = {
  blue:   '#3b82f6', green:  '#10b981', amber:  '#f59e0b',

function setProgress(pct, label) {
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = label;
}

// Parse CSV text and render dashboard immediately (no setTimeout delays)
function parseCsvAndRender(csvText, showLoadingFirst) {
  if (showLoadingFirst) {
    setProgress(85, 'Building dashboard…');
    document.getElementById('gs-status').textContent = 'Building dashboard…';
  }
  Papa.parse(csvText, {
    skipEmptyLines: true,
    complete: function(results) {
      Object.values(charts).forEach(c => c.destroy());
      charts = {}; rawData = []; allMonths = [];
      processCSV(results.data);
      if (showLoadingFirst) {
        setProgress(100, 'Done!');
        document.getElementById('upload-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
      }
    },
    error: function(err) { if (showLoadingFirst) showSheetError('Parse error: ' + err.message); }
  });
}

// Save CSV to localStorage cache
function cacheCSV(csv) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), csv })); } catch(e) {}
}

// Silently fetch fresh data in background after loading from cache
function fetchSheetInBackground() {
  fetch(SHEET_CSV_URL)
    .then(r => r.ok ? r.text() : null)
    .then(csv => {
      if (!csv) return;
      cacheCSV(csv);
      parseCsvAndRender(csv, false); // re-render silently
    })
    .catch(() => {}); // fail silently — cached data already shown
}

function loadFromGoogleSheets(skipCache) {
  // Try serving from cache first for instant load
  if (!skipCache) {
    try {
      const cached = JSON.parse(localStorage.getItem(CACHE_KEY));
      if (cached && cached.csv && (Date.now() - cached.ts) < CACHE_TTL) {
        // Instant render from cache
        document.getElementById('gs-status').textContent = 'Loading from cache…';
        setProgress(80, 'Loading from cache…');
        try { parseCsvAndRender(cached.csv, true); } catch(e) { console.error('Cache render error:', e); }
        fetchSheetInBackground(); // refresh in background
        return;
      }
    } catch(e) {}
  }

  // No cache or force-refresh — show loading screen and fetch
  document.getElementById('upload-screen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('gs-status').textContent = 'Connecting to Google Sheets…';
  document.getElementById('gs-sub').textContent = 'Fetching latest data';
  document.getElementById('gs-error').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'block';
  setProgress(15, 'Connecting to Google Sheets…');

  fetch(SHEET_CSV_URL)
    .then(res => {
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      setProgress(55, 'Downloading data…');
      document.getElementById('gs-status').textContent = 'Downloading data…';
      return res.text();
    })
    .then(csvText => {
      cacheCSV(csvText);
      try {
        parseCsvAndRender(csvText, true);
      } catch(renderErr) {
        console.error('Render error:', renderErr);
        showSheetError('Data loaded but render failed: ' + renderErr.message);
      }
    })
    .catch(err => showSheetError('Could not fetch sheet. Ensure it is shared publicly. Error: ' + err.message));
}

function showSheetError(msg) {
  setProgress(0, '');
  document.getElementById('gs-status').textContent = 'Connection failed';
  document.getElementById('gs-sub').textContent = 'See error below';
  const el = document.getElementById('gs-error');
  el.textContent = msg;
  el.style.display = 'block';
}

// ─── CSV PROCESSING ──────────────────────────────────────────────────────────
function processCSV(rows) {
  // Find header row (contains 'YearMonth')
  let headerIdx = -1;
  for (let i = 0; i < Math.min(15, rows.length); i++) {
    if (rows[i][0] && String(rows[i][0]).includes('YearMonth')) { headerIdx = i; break; }
  }
  if (headerIdx === -1) { alert('Could not find header row. Ensure first column is YearMonth.'); return; }

  const dataRows = rows.slice(headerIdx + 1);
  rawData = [];

  dataRows.forEach(row => {
    const ym = String(row[0] || '').replace(/[",\s]/g, '');
    if (!ym.match(/^\d{6}$/)) return;

    rawData.push({
      ym,
      title:        String(row[2] || '').trim(),
      tag:          String(row[3] || '').trim(),
      category:     String(row[4] || '').trim(),
      showType:     String(row[5] || '').trim(),
      aiPgc:        String(row[6] || '').trim(),
      prodStatus:   toNum(row[7]),
      writingType:  String(row[10] || '').trim(),
      voaType:      String(row[11] || '').trim(),
      soundType:    String(row[13] || '').trim(),
      underRevEps:  toNum(row[14]),
      approvedEps:  toNum(row[16]),
      appWords:     toNum(row[17]),
      prodEps:      toNum(row[18]),
      prodHr:       toNum(row[19]),
      finalMastEps: toNum(row[20]),
      finalMastHr:  toNum(row[21]),
      editHr:       toNum(row[53]),
      editCost:     toNum(row[28]),
      editCPH:      toNum(row[29]),
      voaCost:      toNum(row[36]),
      voaCPH:       toNum(row[37]),
      postCost:     toNum(row[43]),
      postCPH:      toNum(row[44]),
      totalCost:    toNum(row[46]),
      segCPH:       toNum(row[47]),
      newLaunch:    toNum(row[56]),
      ppv:          toNum(row[58])
    });
  });

  allMonths = [...new Set(rawData.map(r => r.ym))].sort();
  populateFilters();
  renderDashboard();
}

// ─── FILTERS ─────────────────────────────────────────────────────────────────
function populateFilters() {
  // Category order: pinned first, then rest alphabetically
  const CAT_ORDER = ['Romance', 'Romantasy', 'Fantasy', 'CrimeThriller'];
  const allCats = [...new Set(rawData.map(r => r.category).filter(Boolean))];
  const cats = [
    ...CAT_ORDER.filter(c => allCats.includes(c)),
    ...allCats.filter(c => !CAT_ORDER.includes(c)).sort()
  ];

  // Show Type filter now uses column G (AI/PGC)
  const types = [...new Set(rawData.map(r => r.aiPgc).filter(Boolean))].sort();

  const mStart = document.getElementById('filter-month-start');
  const mEnd = document.getElementById('filter-month-end');
  [mStart, mEnd].forEach(sel => {
    while (sel.options.length > 1) sel.remove(1);
  });
  allMonths.forEach(m => {
    mStart.add(new Option(fmt(m), m));
    mEnd.add(new Option(fmt(m), m));
  });
  mStart.value = '';
  mEnd.value = '';

  const catSel = document.getElementById('filter-category');
  while (catSel.options.length > 1) catSel.remove(1);
  cats.forEach(c => catSel.add(new Option(c, c)));

  const typeSel = document.getElementById('filter-type');
  while (typeSel.options.length > 1) typeSel.remove(1);
  types.forEach(t => typeSel.add(new Option(t, t)));
}

function getFilteredData() {
  const mStart = document.getElementById('filter-month-start').value;
  const mEnd = document.getElementById('filter-month-end').value;
  const cat = document.getElementById('filter-category').value;
  const type = document.getElementById('filter-type').value;

  return rawData.filter(r => {
    // 202603 now included — data is complete
    if (r.tag === 'Growth Test') return false;
    if (r.title === 'Solo Leveling') return false;
    if (r.aiPgc === 'UGC') return false;
    if (!r.aiPgc) return false;
    if (mStart && r.ym < mStart) return false;
    if (mEnd && r.ym > mEnd) return false;
    if (cat && r.category !== cat) return false;
    if (type && r.aiPgc !== type) return false;
    return true;
  });
}

// ─── LINEAR REGRESSION ──────────────────────────────────────────────────────────
function _linReg(vals) {
  const n = vals.length;
  if (n < 2) return vals.slice();
  const clean = vals.map(v => v || 0);
  const sx = n*(n-1)/2, sx2 = n*(n-1)*(2*n-1)/6;
  const sy  = clean.reduce((a,b)=>a+b, 0);
  const sxy = clean.reduce((s,v,i)=>s+i*v, 0);
  const denom = n*sx2 - sx*sx;
  if (!denom) return clean.slice();
  const slope = (n*sxy - sx*sy) / denom;
  const intercept = (sy - slope*sx) / n;
  return clean.map((_, i) => slope*i + intercept);
}

function renderMoMDashboard(data, months) {
  ['mom-edit','mom-prodpost','mom-combined','mom-hours','mom-launch'].forEach(id => destroyChart(id));

  const tab = _mainTab;
  const d = tab === 'overall' ? data : data.filter(r => r.category === tab);
  const tabLabel = tab === 'overall' ? 'Overall' : tab;

  const METRICS = [
    { id:'mom-edit', title:'Editorial Cost',       key:'editCost', hrsKey:'prodHr',  hrsLabel:'Prod Hrs', color:'#8b5cf6' },
    { id:'mom-prod', title:'Production Cost',      key:'voaCost',  hrsKey:'prodHr',  hrsLabel:'Prod Hrs', color:'#10b981' },
    { id:'mom-post', title:'Post Production Cost', key:'postCost', hrsKey:'fmHr',    hrsLabel:'FM Hrs',   color:'#f59e0b' },
  ];

  // ── SINGLE-PASS AGGREGATION ──────────────────────────────────────────
  const agg = {};
  const editByAiPgc    = {}; // { ym: { aiPgc: editCost } }
  const ppByVoaType    = {}; // { ym: { voaType: { voaCost, postCost } } }
  const editHrByAiPgc  = {}; // { ym: { aiPgc: editHr } }
  const prodHrByAiPgc  = {}; // { ym: { aiPgc: prodHr } }
  const fmHrByAiPgc    = {}; // { ym: { aiPgc: fmHr } }
  const launchByAiPgc  = {}; // { ym: { aiPgc: launchCount } }
  const ppvByYm        = {}; // { ym: { launches: n, ppv: n } }
  const ppvByYmType    = {}; // { ym: { aiPgc: { launches, ppv } } }
  const ppvByYmCat     = {}; // { ym: { category: { launches, ppv } } }
  const ppvByYmTypeCat = {}; // { ym: { aiPgc: { category: { launches, ppv } } } }
  const cphByAiPgc = {}; // { ym: { aiPgc: { editCost, voaCost, postCost, editHr, prodHr, fmHr } } }

  // Pre-build set of all PPV-validated show titles (show-level attribute, may be on any row)
  const ppvShows = new Set(d.filter(r => r.ppv === 1).map(r => r.title).filter(Boolean));

  d.forEach(r => {
    // Totals
    if (!agg[r.ym]) agg[r.ym] = { editCost:0, voaCost:0, postCost:0, editHr:0, prodHr:0, fmHr:0, launches:0 };
    const a = agg[r.ym];
    a.editCost += r.editCost; a.voaCost += r.voaCost; a.postCost += r.postCost;
    a.editHr += r.editHr; a.prodHr += r.prodHr; a.fmHr += r.finalMastHr;
    if (r.newLaunch > 0) a.launches += 1;

    // Editorial by AI/PGC (col G)
    const gKey = r.aiPgc || 'Unknown';
    if (!editByAiPgc[r.ym]) editByAiPgc[r.ym] = {};
    editByAiPgc[r.ym][gKey] = (editByAiPgc[r.ym][gKey] || 0) + r.editCost;

    // Hrs by AI/PGC
    editHrByAiPgc[r.ym] = editHrByAiPgc[r.ym] || {};
    editHrByAiPgc[r.ym][gKey] = (editHrByAiPgc[r.ym][gKey] || 0) + r.editHr;
    prodHrByAiPgc[r.ym] = prodHrByAiPgc[r.ym] || {};
    prodHrByAiPgc[r.ym][gKey] = (prodHrByAiPgc[r.ym][gKey] || 0) + r.prodHr;
    fmHrByAiPgc[r.ym] = fmHrByAiPgc[r.ym] || {};
    fmHrByAiPgc[r.ym][gKey] = (fmHrByAiPgc[r.ym][gKey] || 0) + r.finalMastHr;
    // CPH components by AI/PGC
    if (!cphByAiPgc[r.ym]) cphByAiPgc[r.ym] = {};
    if (!cphByAiPgc[r.ym][gKey]) cphByAiPgc[r.ym][gKey] = { editCost:0, voaCost:0, postCost:0, editHr:0, prodHr:0, fmHr:0 };
    const cg = cphByAiPgc[r.ym][gKey];
    cg.editCost += r.editCost; cg.voaCost += r.voaCost; cg.postCost += r.postCost;
    cg.editHr += r.editHr; cg.prodHr += r.prodHr; cg.fmHr += r.finalMastHr;
    // Launches by AI/PGC
    if (r.newLaunch > 0) {
      launchByAiPgc[r.ym] = launchByAiPgc[r.ym] || {};
      launchByAiPgc[r.ym][gKey] = (launchByAiPgc[r.ym][gKey] || 0) + 1;
      ppvByYm[r.ym] = ppvByYm[r.ym] || { launches:0, ppv:0 };
      ppvByYm[r.ym].launches += 1;
      if (ppvShows.has(r.title)) ppvByYm[r.ym].ppv += 1;
      ppvByYmType[r.ym] = ppvByYmType[r.ym] || {};
      ppvByYmType[r.ym][gKey] = ppvByYmType[r.ym][gKey] || { launches:0, ppv:0 };
      ppvByYmType[r.ym][gKey].launches += 1;
      if (ppvShows.has(r.title)) ppvByYmType[r.ym][gKey].ppv += 1;
      const cKey = r.category || 'Unknown';
      ppvByYmCat[r.ym] = ppvByYmCat[r.ym] || {};
      ppvByYmCat[r.ym][cKey] = ppvByYmCat[r.ym][cKey] || { launches:0, ppv:0 };
      ppvByYmCat[r.ym][cKey].launches += 1;
      if (ppvShows.has(r.title)) ppvByYmCat[r.ym][cKey].ppv += 1;
      ppvByYmTypeCat[r.ym] = ppvByYmTypeCat[r.ym] || {};
      ppvByYmTypeCat[r.ym][gKey] = ppvByYmTypeCat[r.ym][gKey] || {};
      ppvByYmTypeCat[r.ym][gKey][cKey] = ppvByYmTypeCat[r.ym][gKey][cKey] || { launches:0, ppv:0 };
      ppvByYmTypeCat[r.ym][gKey][cKey].launches += 1;
      if (ppvShows.has(r.title)) ppvByYmTypeCat[r.ym][gKey][cKey].ppv += 1;
    }

    // Prod+Post by VOA Type (col L)
    const vKey = r.voaType || 'Unknown';
    if (!ppByVoaType[r.ym]) ppByVoaType[r.ym] = {};
    if (!ppByVoaType[r.ym][vKey]) ppByVoaType[r.ym][vKey] = { voaCost:0, postCost:0 };
    ppByVoaType[r.ym][vKey].voaCost  += r.voaCost;
    ppByVoaType[r.ym][vKey].postCost += r.postCost;
  });

  const totVal = (mo, key) => { const c = agg[mo]; if (!c) return 0; return c[key] || 0; };

  // Unique groups for stacked charts — with preferred ordering
  const EDIT_ORDER = ['US PGC', 'India PGC', 'ER + VO', 'AI Adapted'];
  const VOA_ORDER  = ['VOA', 'Top Tier AIVO', 'AIVO'];
  const allAiPgcGroups = [...new Set(Object.values(editByAiPgc).flatMap(mo => Object.keys(mo)))].filter(g => g && g !== 'Unknown');
  const allVoaGroups   = [...new Set(Object.values(ppByVoaType).flatMap(mo => Object.keys(mo)))].filter(g => g && g !== 'Unknown');
  const aiPgcGroups = [...EDIT_ORDER.filter(g => allAiPgcGroups.includes(g)), ...allAiPgcGroups.filter(g => !EDIT_ORDER.includes(g)).sort()];
  const voaGroups   = [...VOA_ORDER.filter(g => allVoaGroups.includes(g)),   ...allVoaGroups.filter(g => !VOA_ORDER.includes(g)).sort()];

  const metricTotals  = METRICS.map(m => months.map(mo => totVal(mo, m.key)));
  const totalLaunches = months.map(mo => totVal(mo, 'launches'));
  const grandTotals   = metricTotals.map(arr => arr.reduce((s,v)=>s+v,0));
  const grandLaunches = totalLaunches.reduce((s,v)=>s+v,0);
  const grandOverall  = grandTotals.reduce((s,v)=>s+v,0);

  // Shared Y-axis max across all 3 cost charts (for comparison)
  const maxCostY = Math.max(...metricTotals.flat(), 1) * 1.12;
  const latestMo  = months.length > 0 ? fmt(months[months.length-1]) : '—';
  const editHrTotals = months.map(mo => totVal(mo, 'editHr'));
  const prodHrTotals = months.map(mo => totVal(mo, 'prodHr'));
  const fmHrTotals   = months.map(mo => totVal(mo, 'fmHr'));
  const grandEditHr  = editHrTotals.reduce((s,v)=>s+v,0);
  const grandProdHr  = prodHrTotals.reduce((s,v)=>s+v,0);
  const grandFmHr    = fmHrTotals.reduce((s,v)=>s+v,0);

  // Latest-month KPI values
  const lmKey  = months[months.length - 1];
  const pmKey  = months.length > 1 ? months[months.length - 2] : null;
  const lmEdit = agg[lmKey]?.editCost  || 0;
  const lmVoa  = agg[lmKey]?.voaCost   || 0;
  const lmPost = agg[lmKey]?.postCost  || 0;
  const lmTot  = lmEdit + lmVoa + lmPost;
  const lmLaunch = agg[lmKey]?.launches || 0;
  const pmTot  = pmKey ? ((agg[pmKey]?.editCost||0)+(agg[pmKey]?.voaCost||0)+(agg[pmKey]?.postCost||0)) : 0;

  // CPH for latest & prior month (inline safe divide)
  const _sc = (c,h) => h > 0 ? c/h : 0;
  const la = agg[lmKey] || {}, pa = pmKey ? agg[pmKey]||{} : {};
  const lmEditCPH = _sc(la.editCost||0, la.editHr||0);
  const lmProdCPH = _sc(la.voaCost||0,  la.prodHr||0);
  const lmPostCPH = _sc(la.postCost||0, la.fmHr||0);
  const lmTotCPH  = lmEditCPH + lmProdCPH + lmPostCPH;
  const pmEditCPH = _sc(pa.editCost||0, pa.editHr||0);
  const pmProdCPH = _sc(pa.voaCost||0,  pa.prodHr||0);
  const pmPostCPH = _sc(pa.postCost||0, pa.fmHr||0);
  const pmTotCPH  = pmEditCPH + pmProdCPH + pmPostCPH;

  // PPV% last 6 months (consolidated)
  const last6Mo   = months.slice(-6);
  const l6Launch  = last6Mo.reduce((s,mo) => s+(ppvByYm[mo]?.launches||0), 0);
  const l6PPV     = last6Mo.reduce((s,mo) => s+(ppvByYm[mo]?.ppv||0),      0);
  const l6PPVpct  = l6Launch > 0 ? (l6PPV/l6Launch*100).toFixed(1) : '0.0';
  const l6TotalCost = last6Mo.reduce((s,mo) => s+((agg[mo]?.editCost||0)+(agg[mo]?.voaCost||0)+(agg[mo]?.postCost||0)), 0);

  // Efficiency metrics (last 6M)
  const costPerLaunch = l6Launch > 0 ? l6TotalCost / l6Launch : 0;
  const costPerPPV    = l6PPV    > 0 ? l6TotalCost / l6PPV    : 0;

  // Spend share %
  const editSharePct = lmTot > 0 ? (lmEdit/lmTot*100) : 0;
  const prodSharePct = lmTot > 0 ? (lmVoa /lmTot*100) : 0;
  const postSharePct = lmTot > 0 ? (lmPost/lmTot*100) : 0;

  function momBadge(curr, prev) {
    if (!prev || prev === 0) return '';
    const pct = ((curr - prev) / prev * 100).toFixed(1);
    const up = curr >= prev;
    return `<span style="font-size:0.68rem;font-weight:700;color:${up?'#f59e0b':'#10b981'};margin-left:8px">${up?'▲':'▼'}${Math.abs(pct)}% MoM</span>`;
  }
  function cphBadge(curr, prev) {
    if (!prev || prev === 0) return '';

    const tl = ppvBase.reduce((s,v)=>s+v,0), tp = ppvCounts.reduce((s,v)=>s+v,0);
    document.getElementById('mom-ppv-summary').innerHTML =
      `<span style="color:#f472b6;font-weight:700">${tl > 0 ? (tp/tl*100).toFixed(1) : 0}% overall</span>`;
    if (charts['mom-ppv']) { charts['mom-ppv'].destroy(); delete charts['mom-ppv']; }
    charts['mom-ppv'] = new Chart(document.getElementById('mom-ppv-chart').getContext('2d'), {
      type:'bar',
      data:{ labels:months.map(fmt), datasets:[{
        label:'PPV%', data:ppvPct,
        backgroundColor:'#f472b699', borderColor:'#f472b6', borderWidth:1.5, borderRadius:4
      }]},
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ display:false },
          tooltip:{ callbacks:{ label: c => ` ${c.parsed.y}% (${ppvCounts[c.dataIndex]} of ${ppvBase[c.dataIndex]} launches)` }} },
        scales:{
          x:{ ticks:{ color:'#7aaa90', font:{size:11} }, grid:{ color:'#1e3d30' } },
          y:{ min:0, max:100, ticks:{ color:'#7aaa90', font:{size:11}, callback: v => v+'%' }, grid:{ color:'#1e3d30' } }
        }
      }
    });
    document.getElementById('mom-ppv-table').innerHTML =
      `<table><thead><tr><th>Month</th><th>Launches</th><th>PPV Count</th><th>PPV%</th></tr></thead><tbody>${
        [...months].reverse().map(mo => { const i = months.indexOf(mo);
          return `<tr><td>${fmt(mo)}</td><td>${ppvBase[i]}</td><td>${ppvCounts[i]}</td><td><strong>${ppvPct[i]}%</strong></td></tr>`;
        }).join('')
      }</tbody></table>`;
  }
  ppvTypeSel.addEventListener('change', redrawPpvChart);
  ppvGenreSel.addEventListener('change', redrawPpvChart);
  redrawPpvChart();

  // ── CPH SECTION ───────────────────────────────────────────────────────
  function safeCPH(cost, hrs) { return hrs > 0 ? +(cost / hrs).toFixed(2) : 0; }
  const yCphTick = { color:'#94a3b8', font:{size:11}, callback: v => '$'+v.toFixed(0) };

  // KPI cards — latest month blended CPH (la already declared above)
  const kpiEditCPH  = safeCPH(la.editCost || 0, la.editHr  || 0);
  const kpiProdCPH  = safeCPH(la.voaCost  || 0, la.prodHr  || 0);
  const kpiPostCPH  = safeCPH(la.postCost || 0, la.fmHr    || 0);
  const kpiTotalCPH = kpiEditCPH + kpiProdCPH + kpiPostCPH;
  document.getElementById('cph-kpi-row').innerHTML = [
    { label:'Editorial CPH',       val:kpiEditCPH,  color:'#8b5cf6' },
    { label:'Production CPH',      val:kpiProdCPH,  color:'#10b981' },
    { label:'Post Production CPH', val:kpiPostCPH,  color:'#f59e0b' },
    { label:'Total CPH',           val:kpiTotalCPH, color:'#a78bfa' },
  ].map(k => `<div class="mom-section" style="padding:16px">
    <div style="font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">${k.label} · ${latestMo}</div>
    <div style="font-size:1.6rem;font-weight:700;color:var(--text);border-left:3px solid ${k.color};padding-left:10px">$${k.val.toFixed(2)}</div>
  </div>`).join('');

  // Chart 1: Overall CPH by show type — grouped+stacked bars
  // Each show type = its own stack group, split internally by segment CPH (own cost ÷ own hours)
  // Opacity levels: Editorial (darkest) → Production → Post Production (lightest)
  const cph1Datasets = aiPgcGroups.flatMap(g => {
    const col = typeColor(g);
    const seg = (key, hrKey) => months.map(mo => safeCPH(cphByAiPgc[mo]?.[g]?.[key]||0, cphByAiPgc[mo]?.[g]?.[hrKey]||0));
    return [
      { label: g,             stack: g, data: seg('editCost','editHr'),
        backgroundColor: col+'ee', borderColor: col, borderWidth:1.5, borderRadius:2 },
      { label: '__'+g+'_prod', stack: g, data: seg('voaCost','prodHr'),
        backgroundColor: col+'88', borderColor: col, borderWidth:1 },
      { label: '__'+g+'_post', stack: g, data: seg('postCost','fmHr'),
        backgroundColor: col+'33', borderColor: col, borderWidth:1 },
    ];
  });
  charts['mom-cph1'] = new Chart(document.getElementById('mom-cph1-chart').getContext('2d'), {
    type:'bar',
    data:{ labels:months.map(fmt), datasets: cph1Datasets },
    options:{ responsive:true, maintainAspectRatio:false, interaction:{ mode:'index', intersect:false },
      plugins:{
        legend:{ labels:{ color:'#7aaa90', font:{size:11}, padding:12,
          filter: item => !item.text.startsWith('__') }},
        tooltip:{ callbacks:{
          label: c => {
            const g = c.dataset.stack;
            const seg = c.dataset.label.startsWith('__')
              ? (c.dataset.label.includes('_prod') ? 'Production' : 'Post Prod') : 'Editorial';
            return ` ${g} — ${seg}: $${c.parsed.y.toFixed(2)}/hr`;
          },
          footer: items => {
            const totals = {};
            items.forEach(i => { totals[i.dataset.stack] = (totals[i.dataset.stack]||0) + i.parsed.y; });
            return Object.entries(totals).map(([g,v]) => ` ${g} Total: $${v.toFixed(2)}/hr`).join('\n');
          }
        }}
      },
      scales:{ x:{ stacked:true, ticks:{ color:'#7aaa90', font:{size:11} }, grid:{ color:'#1e3d30' } },
               y:{ stacked:true, ticks: yCphTick, grid:{ color:'#334155' } } }
    }
  });
  // Table: each show type's Editorial / Production / Post CPH + Overall CPH
  document.getElementById('mom-cph1-table').innerHTML = `<table><thead><tr><th>Month</th>${
    aiPgcGroups.map(g=>`<th colspan="2" style="color:${typeColor(g)};text-align:center">${g}</th>`).join('')
  }</tr><tr><th></th>${aiPgcGroups.map(()=>'<th>Breakdown</th><th>Total CPH</th>').join('')}</tr></thead><tbody>${
    [...months].reverse().map(mo => {
      const cells = aiPgcGroups.map(g => {
        const c = cphByAiPgc[mo]?.[g];
        if (!c) return '<td>—</td><td>—</td>';
        const e = safeCPH(c.editCost, c.editHr);
        const p = safeCPH(c.voaCost,  c.prodHr);
        const f = safeCPH(c.postCost, c.fmHr);
        return `<td style="font-size:0.68rem;color:var(--muted)">E:$${e.toFixed(0)} P:$${p.toFixed(0)} PP:$${f.toFixed(0)}</td><td><strong>$${(e+p+f).toFixed(2)}</strong></td>`;
      }).join('');
      return `<tr><td>${fmt(mo)}</td>${cells}</tr>`;
    }).join('')
  }</tbody></table>`;

  // Chart 2: CPH by segment — stacked bar with show type filter
  const cph2Sel = document.getElementById('cph2-type-filter');
  aiPgcGroups.forEach(g => { const o = document.createElement('option'); o.value = g; o.textContent = g; cph2Sel.appendChild(o); });

  function getCph2Data(typeFilter) {
    return months.map(mo => {
      let ec=0, eh=0, vc=0, ph=0, pc=0, fh=0;
      if (typeFilter) {
        const c = cphByAiPgc[mo]?.[typeFilter];
        if (c) { ec=c.editCost; eh=c.editHr; vc=c.voaCost; ph=c.prodHr; pc=c.postCost; fh=c.fmHr; }
      } else {
        ec=agg[mo]?.editCost||0; eh=agg[mo]?.editHr||0;
        vc=agg[mo]?.voaCost||0;  ph=agg[mo]?.prodHr||0;
        pc=agg[mo]?.postCost||0; fh=agg[mo]?.fmHr||0;
      }
      return { editCPH: safeCPH(ec,eh), prodCPH: safeCPH(vc,ph), postCPH: safeCPH(pc,fh) };
    });
  }

  function redrawCph2() {
    const tf = cph2Sel.value;
    const segData = getCph2Data(tf);
    const editCPHs = segData.map(s => s.editCPH);
    const prodCPHs = segData.map(s => s.prodCPH);
    const postCPHs = segData.map(s => s.postCPH);
    const totals   = segData.map(s => s.editCPH + s.prodCPH + s.postCPH);
    const lastTotal = totals[totals.length-1] || 0;
    document.getElementById('cph2-summary').innerHTML =
      `<span style="color:#fb923c;font-weight:700">$${lastTotal.toFixed(2)}/hr in ${latestMo}</span>`;
    if (charts['mom-cph2']) { charts['mom-cph2'].destroy(); delete charts['mom-cph2']; }
    charts['mom-cph2'] = new Chart(document.getElementById('mom-cph2-chart').getContext('2d'), {
      type:'bar',
      data:{ labels:months.map(fmt), datasets:[
        { label:'Editorial CPH',       stack:'cph2', data:editCPHs, backgroundColor:'#8b5cf699', borderColor:'#8b5cf6', borderWidth:1.5, borderRadius:2 },
        { label:'Production CPH',      stack:'cph2', data:prodCPHs, backgroundColor:'#10b98199', borderColor:'#10b981', borderWidth:1.5, borderRadius:2 },
        { label:'Post Production CPH', stack:'cph2', data:postCPHs, backgroundColor:'#f59e0b99', borderColor:'#f59e0b', borderWidth:1.5, borderRadius:2 },
      ]},
      options:{ responsive:true, maintainAspectRatio:false, interaction:{ mode:'index', intersect:false },
        plugins:{ legend: legendCfg,
          tooltip:{ callbacks:{ label: c => ` ${c.dataset.label}: $${c.parsed.y.toFixed(2)}/hr`,
            footer: items => ` Total: $${items.reduce((s,i)=>s+i.parsed.y,0).toFixed(2)}/hr` }} },
        scales:{ x:{ stacked:true, ticks:{ color:'#7aaa90', font:{size:11} }, grid:{ color:'#1e3d30' } },
                 y:{ stacked:true, ticks: yCphTick, grid:{ color:'#334155' } } }
      }
    });
    document.getElementById('mom-cph2-table').innerHTML = `<table><thead><tr><th>Month</th><th style="color:#8b5cf6">Edit CPH</th><th style="color:#10b981">Prod CPH</th><th style="color:#f59e0b">Post CPH</th><th>Total CPH</th><th>MoM%</th></tr></thead><tbody>${
      [...months].reverse().map(mo => { const i = months.indexOf(mo); const s = segData[i];
        const total = s.editCPH + s.prodCPH + s.postCPH;
        const prev  = i > 0 ? segData[i-1].editCPH + segData[i-1].prodCPH + segData[i-1].postCPH : null;
        const mom   = prev && prev > 0 ? ((total - prev)/prev*100).toFixed(1) : null;
        const momHtml = mom == null ? '—' : `<span style="color:${parseFloat(mom)>0?'#f59e0b':'#10b981'};font-weight:700">${parseFloat(mom)>0?'▲':'▼'}${Math.abs(mom)}%</span>`;
        return `<tr><td>${fmt(months[i])}</td><td>$${s.editCPH.toFixed(2)}</td><td>$${s.prodCPH.toFixed(2)}</td><td>$${s.postCPH.toFixed(2)}</td><td><strong>$${total.toFixed(2)}</strong></td><td>${momHtml}</td></tr>`;
      }).join('')
    }</tbody></table>`;
  }
  cph2Sel.addEventListener('change', redrawCph2);
  redrawCph2();

  // CPH Trend line — blended total CPH per show type over time + overall total
  const cphTrendDatasets = aiPgcGroups.map(g => ({
    label: g,
    data: months.map(mo => {
      const c = cphByAiPgc[mo]?.[g];
      if (!c) return 0;
      const totalHr = c.editHr + c.prodHr + c.fmHr;
      return safeCPH(c.editCost + c.voaCost + c.postCost, totalHr);
    }),
    borderColor: typeColor(g), backgroundColor: typeColor(g)+'22',
    borderWidth:2, pointRadius:3, tension:0.3, fill:false, order:1
  }));
  cphTrendDatasets.push({
    label:'Overall Total', order:0,
    data: months.map(mo => {
      const totalHr = (agg[mo]?.editHr||0) + (agg[mo]?.prodHr||0) + (agg[mo]?.fmHr||0);
      return safeCPH((agg[mo]?.editCost||0)+(agg[mo]?.voaCost||0)+(agg[mo]?.postCost||0), totalHr);
    }),
    borderColor:'#e6f5ee', backgroundColor:'#e6f5ee22',
    borderWidth:3.5, pointRadius:5, pointHoverRadius:7, tension:0.3, fill:false
  });
  charts['mom-cph-trend'] = new Chart(document.getElementById('mom-cph-trend-chart').getContext('2d'), {
    type:'line',
    data:{ labels:months.map(fmt), datasets: cphTrendDatasets },
    options:{ responsive:true, maintainAspectRatio:false, interaction:{ mode:'index', intersect:false },
      plugins:{ legend: legendCfg, tooltip:{ callbacks:{ label: c => ` ${c.dataset.label}: $${c.parsed.y.toFixed(2)}/hr` }} },
      scales:{ x: xLineCfg, y:{ ticks: yCphTick, grid:{ color:'#334155' } } }
    }
  });
}

// ─── SOLO LEVELING SECTION ────────────────────────────────────────────
function renderSoloLevelingSection() {
  const mStart = document.getElementById('filter-month-start').value;
  const mEnd   = document.getElementById('filter-month-end').value;

  // Pull Solo Leveling rows directly from rawData (bypasses getFilteredData exclusion)
  const slData = rawData.filter(r => {
    if (r.title !== 'Solo Leveling') return false;
    if (mStart && r.ym < mStart) return false;
    if (mEnd   && r.ym > mEnd)   return false;
    return true;
  });

  const slMonths = [...new Set(slData.map(r => r.ym))].sort();
  const el = document.getElementById('sl-section');

  if (slData.length === 0) { el.innerHTML = ''; return; }

  // Aggregate by month
  const slAgg = {};
  slData.forEach(r => {
    if (!slAgg[r.ym]) slAgg[r.ym] = { editCost:0, voaCost:0, postCost:0, editHr:0, prodHr:0, fmHr:0, launches:0 };
    const a = slAgg[r.ym];
    a.editCost += r.editCost; a.voaCost += r.voaCost; a.postCost += r.postCost;
    a.editHr   += r.editHr;   a.prodHr  += r.prodHr;  a.fmHr    += r.finalMastHr;
    if (r.newLaunch > 0) a.launches += 1;
  });

  function slSafeCPH(cost, hrs) { return hrs > 0 ? +(cost / hrs).toFixed(2) : 0; }

  const lmKey = slMonths[slMonths.length - 1];
  const pmKey = slMonths.length > 1 ? slMonths[slMonths.length - 2] : null;
  const la    = slAgg[lmKey] || {};
  const pa    = pmKey ? slAgg[pmKey] || {} : {};
  const lmTot  = (la.editCost||0) + (la.voaCost||0) + (la.postCost||0);
  const pmTot  = (pa.editCost||0) + (pa.voaCost||0) + (pa.postCost||0);
  const latestMo = fmt(lmKey);
  const accent = '#f59e0b'; // gold accent for Solo Leveling

  function slBadge(curr, prev) {
    if (!prev || prev === 0) return '';
    const pct = ((curr - prev) / prev * 100).toFixed(1);
    const up = curr >= prev;
    return `<span style="font-size:0.68rem;font-weight:700;color:${up?'#ef4444':'#10b981'};margin-left:8px">${up?'▲':'▼'}${Math.abs(pct)}% MoM</span>`;
  }

  // CPH for latest month
  const kpiEditCPH = slSafeCPH(la.editCost||0, la.editHr||0);
  const kpiProdCPH = slSafeCPH(la.voaCost||0,  la.prodHr||0);
  const kpiPostCPH = slSafeCPH(la.postCost||0, la.fmHr||0);
  const kpiTotCPH  = kpiEditCPH + kpiProdCPH + kpiPostCPH;

  // Monthly data arrays
  const editCosts  = slMonths.map(mo => slAgg[mo]?.editCost || 0);
  const voaCosts   = slMonths.map(mo => slAgg[mo]?.voaCost  || 0);
  const postCosts  = slMonths.map(mo => slAgg[mo]?.postCost || 0);
  const editHrs    = slMonths.map(mo => slAgg[mo]?.editHr   || 0);
  const prodHrs    = slMonths.map(mo => slAgg[mo]?.prodHr   || 0);
  const fmHrs      = slMonths.map(mo => slAgg[mo]?.fmHr     || 0);
  const editCPHs   = slMonths.map((mo,i) => slSafeCPH(editCosts[i], editHrs[i]));
  const prodCPHs   = slMonths.map((mo,i) => slSafeCPH(voaCosts[i],  prodHrs[i]));
  const postCPHs   = slMonths.map((mo,i) => slSafeCPH(postCosts[i], fmHrs[i]));
  const totCPHs    = slMonths.map((_,i)  => editCPHs[i] + prodCPHs[i] + postCPHs[i]);
  const totalCosts = slMonths.map((_,i)  => editCosts[i] + voaCosts[i] + postCosts[i]);

  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid ${accent}40">
      <div style="background:${accent};color:#000;font-size:0.7rem;font-weight:800;padding:4px 10px;border-radius:4px;letter-spacing:0.5px;text-transform:uppercase">Tracked Separately</div>
      <div style="font-size:1.1rem;font-weight:700;color:${accent}">Solo Leveling</div>
      <div style="font-size:0.75rem;color:var(--muted)">${fmt(slMonths[0])} – ${latestMo} · ${slMonths.length} months</div>
    </div>

    <!-- KPI CARDS -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px">
      <div class="mom-section" style="padding:16px">
        <div style="font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Total Cost · ${latestMo}</div>
        <div style="font-size:1.6rem;font-weight:700;color:var(--text);border-left:3px solid ${accent};padding-left:10px">${cFmt(lmTot)}${slBadge(lmTot,pmTot)}</div>
      </div>
      <div class="mom-section" style="padding:16px">
        <div style="font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Editorial Cost · ${latestMo}</div>
        <div style="font-size:1.6rem;font-weight:700;color:var(--text);border-left:3px solid #8b5cf6;padding-left:10px">${cFmt(la.editCost||0)}${slBadge(la.editCost||0,pa.editCost||0)}</div>
        <div style="font-size:0.7rem;color:var(--muted);margin-top:4px">${lmTot>0?((la.editCost/lmTot)*100).toFixed(1)+'% of total':'—'}</div>
      </div>
      <div class="mom-section" style="padding:16px">
        <div style="font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Production Cost · ${latestMo}</div>
        <div style="font-size:1.6rem;font-weight:700;color:var(--text);border-left:3px solid #10b981;padding-left:10px">${cFmt(la.voaCost||0)}${slBadge(la.voaCost||0,pa.voaCost||0)}</div>
        <div style="font-size:0.7rem;color:var(--muted);margin-top:4px">${lmTot>0?((la.voaCost/lmTot)*100).toFixed(1)+'% of total':'—'}</div>
      </div>
      <div class="mom-section" style="padding:16px">
        <div style="font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Post Prod Cost · ${latestMo}</div>
        <div style="font-size:1.6rem;font-weight:700;color:var(--text);border-left:3px solid #f59e0b;padding-left:10px">${cFmt(la.postCost||0)}${slBadge(la.postCost||0,pa.postCost||0)}</div>
        <div style="font-size:0.7rem;color:var(--muted);margin-top:4px">${lmTot>0?((la.postCost/lmTot)*100).toFixed(1)+'% of total':'—'}</div>
      </div>
    </div>

    <!-- CPH KPI CARDS -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px">
      <div class="mom-section" style="padding:16px">
        <div style="font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Editorial CPH · ${latestMo}</div>
        <div style="font-size:1.6rem;font-weight:700;color:var(--text);border-left:3px solid #8b5cf6;padding-left:10px">$${kpiEditCPH.toFixed(2)}</div>
      </div>
      <div class="mom-section" style="padding:16px">
        <div style="font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Production CPH · ${latestMo}</div>
        <div style="font-size:1.6rem;font-weight:700;color:var(--text);border-left:3px solid #10b981;padding-left:10px">$${kpiProdCPH.toFixed(2)}</div>
      </div>
      <div class="mom-section" style="padding:16px">
        <div style="font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Post Prod CPH · ${latestMo}</div>
        <div style="font-size:1.6rem;font-weight:700;color:var(--text);border-left:3px solid #f59e0b;padding-left:10px">$${kpiPostCPH.toFixed(2)}</div>
      </div>
      <div class="mom-section" style="padding:16px">
        <div style="font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Total CPH · ${latestMo}</div>
        <div style="font-size:1.6rem;font-weight:700;color:var(--text);border-left:3px solid ${accent};padding-left:10px">$${kpiTotCPH.toFixed(2)}</div>
      </div>
    </div>

    <!-- CHARTS ROW -->
    <div class="mom-grid" style="margin-bottom:20px">
      <div class="mom-section">
        <div class="mom-section-hdr"><div>
          <div class="mom-section-title" style="border-left:3px solid ${accent};padding-left:8px">Cost by Segment</div>
          <div style="font-size:0.72rem;color:var(--muted);margin-top:3px;padding-left:11px">Editorial · Production · Post Production</div>
        </div></div>
        <div class="mom-chart-body"><canvas id="sl-cost-chart"></canvas></div>
      </div>
      <div class="mom-section">
        <div class="mom-section-hdr"><div>
          <div class="mom-section-title" style="border-left:3px solid #a78bfa;padding-left:8px">CPH Trend</div>
          <div style="font-size:0.72rem;color:var(--muted);margin-top:3px;padding-left:11px">Editorial · Production · Post Production CPH</div>
        </div></div>
        <div class="mom-chart-body"><canvas id="sl-cph-chart"></canvas></div>
      </div>
    </div>

    <!-- DETAIL TABLE -->
    <div class="mom-section">
      <div class="mom-section-hdr"><div>
        <div class="mom-section-title" style="border-left:3px solid ${accent};padding-left:8px">Monthly Breakdown</div>
      </div></div>
      <div class="mom-hrs-table" id="sl-table"></div>
    </div>
  `;

  // Destroy old charts if re-rendering
  ['sl-cost-chart','sl-cph-chart'].forEach(id => { if (charts[id]) { charts[id].destroy(); delete charts[id]; } });

  const slXCfg = { ticks:{ color:'#7aaa90', font:{size:11} }, grid:{ color:'#1e3d30' } };
  const slGridY = { color:'#334155' };

  // Cost stacked bar
  charts['sl-cost-chart'] = new Chart(document.getElementById('sl-cost-chart').getContext('2d'), {
    type:'bar',
    data:{ labels: slMonths.map(fmt), datasets:[
      { label:'Editorial',       stack:'sl', data:editCosts,  backgroundColor:'#8b5cf699', borderColor:'#8b5cf6', borderWidth:1.5, borderRadius:2 },
      { label:'Production',      stack:'sl', data:voaCosts,   backgroundColor:'#10b98199', borderColor:'#10b981', borderWidth:1.5 },
      { label:'Post Production', stack:'sl', data:postCosts,  backgroundColor:'#f59e0b99', borderColor:'#f59e0b', borderWidth:1.5 },
    ]},
    options:{ responsive:true, maintainAspectRatio:false, interaction:{ mode:'index', intersect:false },
      plugins:{ legend:{ labels:{ color:'#7aaa90', font:{size:11}, padding:12 } },
        tooltip:{ callbacks:{
          label: c => ` ${c.dataset.label}: ${cFmt(c.parsed.y)}`,
          footer: items => ` Total: ${cFmt(items.reduce((s,i)=>s+i.parsed.y,0))}`
        }}},
      scales:{ x:{ stacked:true, ...slXCfg }, y:{ stacked:true, ticks:{ color:'#7aaa90', font:{size:11}, callback:v=>'$'+v.toLocaleString() }, grid:slGridY } }
    }
  });

  // CPH stacked bar
  charts['sl-cph-chart'] = new Chart(document.getElementById('sl-cph-chart').getContext('2d'), {
    type:'bar',
    data:{ labels: slMonths.map(fmt), datasets:[
      { label:'Editorial CPH',       stack:'slcph', data:editCPHs, backgroundColor:'#8b5cf699', borderColor:'#8b5cf6', borderWidth:1.5, borderRadius:2 },
      { label:'Production CPH',      stack:'slcph', data:prodCPHs, backgroundColor:'#10b98199', borderColor:'#10b981', borderWidth:1.5 },
      { label:'Post Production CPH', stack:'slcph', data:postCPHs, backgroundColor:'#f59e0b99', borderColor:'#f59e0b', borderWidth:1.5 },
    ]},
    options:{ responsive:true, maintainAspectRatio:false, interaction:{ mode:'index', intersect:false },
      plugins:{ legend:{ labels:{ color:'#7aaa90', font:{size:11}, padding:12 } },
        tooltip:{ callbacks:{
          label: c => ` ${c.dataset.label}: $${c.parsed.y.toFixed(2)}/hr`,
          footer: items => ` Total CPH: $${items.reduce((s,i)=>s+i.parsed.y,0).toFixed(2)}/hr`
        }}},
      scales:{ x:{ stacked:true, ...slXCfg }, y:{ stacked:true, ticks:{ color:'#7aaa90', font:{size:11}, callback:v=>'$'+v.toFixed(0) }, grid:slGridY } }
    }
  });

  // Detail table (most recent month first)
  document.getElementById('sl-table').innerHTML = `<table>
    <thead><tr>
      <th>Month</th>
      <th style="color:#8b5cf6">Editorial</th><th style="color:#10b981">Production</th><th style="color:#f59e0b">Post Prod</th><th>Total Cost</th>
      <th>Edit Hrs</th><th>Prod Hrs</th><th>FM Hrs</th>
      <th style="color:#8b5cf6">Edit CPH</th><th style="color:#10b981">Prod CPH</th><th style="color:#f59e0b">Post CPH</th><th>Total CPH</th>
      <th>MoM%</th>
    </tr></thead>
    <tbody>${[...slMonths].reverse().map(mo => {
      const i = slMonths.indexOf(mo);
      const a = slAgg[mo] || {};
      const tot = (a.editCost||0)+(a.voaCost||0)+(a.postCost||0);
      const prevTot = i > 0 ? ((slAgg[slMonths[i-1]]?.editCost||0)+(slAgg[slMonths[i-1]]?.voaCost||0)+(slAgg[slMonths[i-1]]?.postCost||0)) : null;
      const mom = prevTot && prevTot > 0 ? ((tot-prevTot)/prevTot*100).toFixed(1) : null;
      const momHtml = mom == null ? '—' : `<span style="color:${parseFloat(mom)>0?'#f59e0b':'#10b981'};font-weight:700">${parseFloat(mom)>0?'▲':'▼'}${Math.abs(mom)}%</span>`;
      return `<tr>
        <td><strong>${fmt(mo)}</strong></td>
        <td>${cFmt(a.editCost||0)}</td><td>${cFmt(a.voaCost||0)}</td><td>${cFmt(a.postCost||0)}</td><td><strong>${cFmt(tot)}</strong></td>
        <td>${(a.editHr||0).toFixed(1)}</td><td>${(a.prodHr||0).toFixed(1)}</td><td>${(a.fmHr||0).toFixed(1)}</td>
        <td>$${editCPHs[i].toFixed(2)}</td><td>$${prodCPHs[i].toFixed(2)}</td><td>$${postCPHs[i].toFixed(2)}</td><td><strong>$${totCPHs[i].toFixed(2)}</strong></td>
        <td>${momHtml}</td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

// ─── RENDER DASHBOARD ─────────────────────────────────────────────────
function renderDashboard() {
  const data = getFilteredData();
  const months = [...new Set(data.map(r => r.ym))].sort();
  updateHeader(data, months);
  buildMainTabs(data);
  renderMoMDashboard(data, months);
  renderSoloLevelingSection();
}
</script>
</body>
</html>
